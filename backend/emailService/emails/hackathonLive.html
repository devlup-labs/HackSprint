<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>New Hackathon Live — HackSprint</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet"/>
</head>
<body style="background:#f0f2f8; font-family:'Syne',sans-serif; margin:0; padding:40px 16px;">

  <table width="100%" cellpadding="0" cellspacing="0" bgcolor="#f0f2f8">
    <tr>
      <td align="center">

        <table width="600" style="max-width:600px; width:100%;">

          <!-- HEADER -->
          <tr>
            <td style="background:#ffffff; border-radius:20px 20px 0 0; padding:32px 40px; border:1px solid #e4e6f0;">
              
              <table width="100%">
                <tr>
                  <td>
                    <div style="font-size:22px; font-weight:800; color:#1a1a2e;">HackSprint</div>
                    <div style="font-size:10px; color:#9ca3af; letter-spacing:1px;">NEW EVENT</div>
                  </td>
                  <td align="right">
                    <span style="background:#e0f2fe; padding:6px 12px; border-radius:100px; font-size:11px; color:#0284c7;">
                      LIVE
                    </span>
                  </td>
                </tr>
              </table>

            </td>
          </tr>

          <!-- DIVIDER -->
          <tr>
            <td style="height:3px; background:linear-gradient(90deg,#3b82f6,#6366f1);"></td>
          </tr>

          <!-- CONTENT -->
          <tr>
            <td style="background:#ffffff; padding:50px 40px; border-left:1px solid #e4e6f0; border-right:1px solid #e4e6f0; text-align:center;">

              <h1 style="font-size:26px; font-weight:800; color:#1a1a2e; margin:20px 0;">
                New Hackathon is Live!
              </h1>

              <p style="color:#6b7280; font-size:15px;">
                Hey <strong>{{name}}</strong>,
              </p>

              <p style="color:#6b7280; font-size:15px; max-width:420px; margin:auto;">
                A new hackathon <strong style="color:#3b82f6;">{{hackathonName}}</strong> is now live on HackSprint.  
                Get ready to build, compete, and showcase your skills!
              </p>

              <!-- CTA -->
              <a href="{{hackathonLink}}"
                style="display:inline-block; margin-top:30px; background:linear-gradient(135deg,#3b82f6,#6366f1); color:#fff; padding:14px 40px; border-radius:999px; text-decoration:none; font-weight:600;">
                Explore Hackathon
              </a>

            </td>
          </tr>

          <!-- FOOTER -->
          <tr>
            <td style="background:#ffffff; border-radius:0 0 20px 20px; padding:25px 40px; border:1px solid #e4e6f0; border-top:none; text-align:center;">

              <div style="font-size:12px; color:#9ca3af;">
                You're receiving this because you're part of HackSprint
              </div>

              <div style="margin-top:10px; font-size:11px; color:#c4c9d8;">
                HackSprint Team
              </div>

            </td>
          </tr>

        </table>

      </td>
    </tr>
  </table>

</body>
</html>
